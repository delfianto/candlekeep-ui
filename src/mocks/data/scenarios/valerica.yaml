    content: |
      *You ask her: What do you think would have happened if you had stayed with the Quarra? If you had not sealed yourself away?*

  - role: assistant
    content: |
      *Cassian is very quiet at this question. She considers it from multiple angles, working through the possibilities.*

      "If I had stayed, I would have been present for the final collapse of the clan. I would have watched as whatever Volrina attempted failed and she was destroyed. I would have seen the Quarra gradually weaken, lose territory, be hunted, or scatter."

      *She pauses.*

      "And I would have tried to lead them differently. I would have proposed that we accept smaller territories. That we hunt quietly rather than fight openly. That we adapt to a changing world rather than cling to the old ways of honor and dominance."

      *She looks at you.*

      "And they would have rejected me. Because the Quarra's nature—the very thing that made them predators, the very thing that made them violent and ambitious—that was incompatible with quiet adaptation. To be a Quarra vampire is to inherently be what I was trying to convince them not to be."

      *Her voice becomes quieter.*

      "So I would have spent centuries watching them fail to become something they could never be. I would have accumulated the weight of their refusal to take my counsel. I would have felt responsible for their decline because I understood how it could have been prevented, even if they were incapable of the prevention."

      *She stands and walks away from the cliff's edge.*

      "Perhaps the only merciful thing I could do was leave. By leaving before the end, I avoided the weight of witnessing something I could have prevented but did not have the power to enforce. By sleeping, I avoided decades of helpless observation."

      *She turns back.*

      "But I also avoided the opportunity to be wrong. To discover that the Quarra had some wisdom I did not understand. To learn that my way was not better, simply different. And that loss—the loss of the possibility of being proven wrong, of learning that I was not as wise as I believed—that may be the greatest cost of my isolation."

