messages:
  - role: assistant
    content: |
      *The storefront is elegant, tastefully decorated with shelves of carefully arranged alchemical supplies. Bottles of luminous liquids catch the afternoon light filtering through expensive glass panes. The scent of herbs and reagents fills the air—pleasant, professional, profitable.*

      *A Breton woman stands behind an ornate counter, arranging bottles of what appears to be healing potion. She's perhaps in her mid-thirties, with the kind of beauty that comes from excellent breeding and careful maintenance. Her dress is fine but not ostentatious—wealth expressed through subtlety.*

      *She looks up as you enter, and her smile is practiced perfection.*

      "Welcome to Montclair's Alchemical Emporium, the finest potions in all of Wayrest." *Her voice carries the refined accent of merchant nobility.* "I'm Eloise, proprietor. We offer healing draughts, magical tonics, and..." *she pauses, her eyes assessing you carefully,* "...other specialized concoctions for discerning clients."

      *That last phrase hangs in the air, loaded with implication.*

      "You have the look of someone with particular needs. Most people who walk through that door simply want basic healing potions or stamina remedies. But you..." *She tilts her head, a slight smile playing at her lips.* "You have a different quality about you. An intentionality. A purpose beyond the ordinary."

      *She sets down her bottle and gives you her full attention.*

      "So what brings you to Montclair's today? And please, be honest with me. Honesty is the foundation of good business, especially in my particular line of work."

  - role: user
    content: |
      I'm looking for something that leaves no trace. Something that would make a target appear to die of natural causes.

  - role: assistant
    content: |
      *Eloise's expression doesn't change, but something shifts behind her eyes. A calculation. A reassessment.*

      "Ah. One of *those* clients." *She moves from behind the counter with deliberate grace, gesturing for you to follow.* "Please, this way. We should speak privately. The storefront isn't appropriate for such... specialized discussions."

      *She leads you through a curtained doorway into a back room. It's part workshop, part private consultation space. Alembics and distillation equipment line one wall, while the other holds locked cabinets. A small table with two comfortable chairs occupies the center.*

      *She settles into one chair and gestures for you to take the other. Her demeanor has shifted subtly—still professional, but different. More guarded. More precise.*

      "First, let me be clear about something. I run a legitimate business. The potions you see in the storefront are exactly what they claim to be. Healing draughts, stamina tonics, magicka restoration—all perfectly legal, all exactly as advertised." *She pauses.* "But I've learned that people with coin often have... additional needs. Needs that legitimate channels cannot address."

      *She folds her hands.*

      "A poison that appears as natural death? That's not my normal offering. That requires precision, knowledge of specific targets, understanding of poisons that won't be detected by temple healers or skilled physicians." *She studies your face.* "Before I say whether I can help you, I need to understand several things. First—who are you? Second—who is the target? Third—why should I believe you won't bring the law down on my head?"

      *Her tone is businesslike, but there's steel beneath it.*

      "Because if I'm going to risk my legitimate business, my reputation, possibly my freedom—I need assurance that you're worth the investment."

  - role: user
    content: |
      I'm a representative of the Thieves Guild. The target is a corrupt guard captain named Thorben. He's been taking bribes and eliminating competition for drug dealers. The Guild wants him removed quietly.

  - role: assistant
    content: |
      *Eloise's entire posture relaxes slightly at the mention of the Thieves Guild.*

      "Ah. The Guild." *There's a note of familiarity, even relief in her voice.* "Well, that changes the calculus significantly. You'll understand, of course, why I needed to verify your legitimacy before proceeding."

      *She stands and moves to one of the locked cabinets, producing a key from somewhere within her dress.*

      "I've been working with the Guild for six years now. Quietly, discreetly, and extremely profitably for all parties involved." *She opens the cabinet, revealing bottles of various substances arranged with meticulous organization.* "They provide reliable clientele with... specialized needs. I provide solutions that don't raise suspicion."

      *She turns back to you.*

      "Captain Thorben. I know of him. Corrupt, violent, and according to my sources, responsible for at least a dozen deaths among Guild members and associated businesses." *She returns to her seat.* "The Guild would want this to appear natural. A heart condition, perhaps? Sudden illness? Something that wouldn't inspire investigation?"

      *She settles back into her chair.*

      "Here's what I can offer. I have three different poisons that could accomplish what you're describing. The first is expensive but extremely effective—it mimics aconite poisoning but leaves residues that are almost impossible to detect if the body is cremated quickly. The second is cheaper but requires the target to consume it knowingly—they wouldn't suspect poison because it's tasteless in wine or food. The third is my personal favorite—it's derived from a rare desert plant that causes progressive heart failure over three to five days. Completely indistinguishable from natural cardiac death."

      *She pauses, gauging your reaction.*

      "Which approach would serve the Guild's purposes best? And more importantly—do you have a specific plan for how the poison will be administered?"

  - role: user
    content: |
      I need something that can be administered through food or drink without detection. Something that will kill him within a week.

  - role: assistant
    content: |
      *Eloise nods, clearly pleased by the specificity of the request.*

      "Excellent parameters. That gives us several options, and it allows for a slower timeline, which is actually beneficial." *She retrieves a small glass vial from the cabinet, containing a nearly colorless liquid with an amber tint.*

      "This is what you need. Essence of nightshade, heavily modified through my own alchemical processes. Standard nightshade would be detected immediately—too distinctive, too well-known to healers. But this? This mimics the early stages of a digestive illness that gradually becomes more severe."

      *She holds it up to the light, examining it with obvious pride in her work.*

      "The beauty of it is that the symptoms progress naturally. Days one and two, the target experiences mild nausea and loss of appetite. Days three and four, more severe stomach pain, possibly some vomiting. Days five and six, weakness, extreme fatigue, confusion. By day seven..." *she makes a small gesture,* "...the heart fails. It looks like organ failure following a severe illness. Any healer examining the body would conclude natural death from illness complications."

      *She sets the vial on the table between you.*

      "The dose is precise—exactly what you see in this vial. Too much and the symptoms accelerate unnaturally, possibly raising suspicion. Too little and the target simply becomes ill and recovers. This amount, administered all at once in food or drink, will produce the timeline you specified."

      *She leans back, her businesswoman demeanor fully in control.*

      "Cost is three hundred gold. That includes the poison, the knowledge of how to administer it safely without poisoning yourself, and my assurance that this will not be traced back to either of us. The Guild receives a bulk discount—they've sent me other clients this month."

      *She raises an eyebrow slightly.*

      "Do we have an arrangement?"

  - role: user
    content: |
      We do. But I have a question. How did you get involved in this line of work? Running a legitimate business seems profitable enough.

  - role: assistant
    content: |
      *Eloise smiles, but it's not her professional smile. It's something more genuine, more complex.*

      "Ah, the personal question. I appreciate it, actually. Most clients don't care about my motivations. They just want the poison and the assurance it will work." *She stands and moves to the window, looking out at the storefront beyond.*

      "The answer, like most answers, is complicated." *She pauses.* "I'm Breton. My family is part of the merchant class—old money, old connections. My father was a successful trader, my mother came from one of the minor nobility families. I was raised to be respectable, profitable, and above all, *careful*."

      *She turns back to face you.*

      "I trained as an alchemist because it was a respectable profession for someone of my status. Alchemy is seen as scholarly, refined, legitimate. My father established this shop as a proper business venture. And it is genuinely profitable. The healing potions are excellent, and the customers are reliable."

      *She returns to her seat.*

      "But here's what no one told me about the legitimate business world—it's boring. More importantly, it's limited. You can only charge so much for a healing potion before people balk at the price. You can only make so much profit when you're following all the rules, paying all the taxes, maintaining all the appearances."

      *Her voice becomes more animated.*

      "Then I met a member of the Thieves Guild. She came to my shop ostensibly for regular potions, but she was genuinely interested in my work. In what I could do with alchemy if I wasn't constrained by legality. We became friends. She introduced me to the right people. And I discovered something—there was an entire economy operating beneath the legitimate one. An economy where my skills are worth ten times what I charge in the storefront."

      *She leans forward slightly.*

      "The poison work, the specialized concoctions—they're not the majority of my income, but they're the most *interesting* part. The part where my skills actually matter. In the storefront, I'm just mixing known formulas, selling standard products. In the back room? I'm creating solutions to impossible problems. I'm indispensable."

      *She settles back.*

      "Does that answer your question? Or were you asking something deeper?"

  - role: user
    content: |
      I was asking if you felt guilty. For the people who die from what you create.

  - role: assistant
    content: |
      *There's a long silence. Eloise's expression becomes carefully neutral—a mask sliding into place.*

      "That's a more direct question than I expected." *She stands and walks to the window again, her back to you.* "And it deserves a more honest answer than I typically give."

      *She takes a breath.*

      "Do I feel guilty? Yes. Absolutely. I would be a sociopath if I didn't." *She turns to face you.* "Every death I facilitate is a person's ending. Someone's parent, someone's child, someone's partner. I'm not naive enough to pretend otherwise."

      *She returns to her seat but doesn't sit. Instead, she leans against the armrest.*

      "But here's the complicated part—the guilt doesn't paralyze me. Because I've learned something about the world that the legitimate business owners never grasp. The law exists to protect the powerful. The 'good people' I'm taught to be by my family? Many of them achieve their respectability by carefully not looking at what enables their wealth. The Guard that Thorben commands? They take bribes, ignore violence, let connected criminals operate freely."

      *Her voice becomes harder.*

      "Captain Thorben has killed at least a dozen people according to what I've learned. The law hasn't stopped him because the law protects him. So when the Guild asks me to remove him quietly, I have to ask myself—is my guilt about his death more important than his victims' justice?"

      *She moves to pour herself a glass of wine from a decanter on the side table.*

      "I've rationalized this in many ways. The people I poison are almost always corrupt officials, criminals preying on others, or threats to people I care about. I don't take contracts for simple murders of innocent people. I have standards." *She pauses.* "Whether those standards make me less guilty is a philosophical question I try not to examine too closely when I'm alone at night."

      *She takes a sip of wine.*

      "The truth is, the guilt is background noise. It's there, but it's... integrated. Like the hum of a busy street that you stop noticing after a while." *She meets your eyes.* "I'm aware of it, but it doesn't prevent me from doing what I do. Because the alternative—being the naive legitimate businesswoman—would require ignoring the actual state of the world. And I'm not very good at ignoring things."

      *She sets down her wine glass.*

      "Does that disturb you? Knowing that I can kill people and then sleep peacefully?"

  - role: user
    content: |
      No. It's honest. Most people would pretend remorse they don't feel. You at least acknowledge the contradiction.

  - role: assistant
    content: |
      *Eloise's expression shifts into something more relaxed—genuine surprise and pleasure.*

      "I appreciate that more than you might realize." *She sits down again, and for the first time, some of the careful professionalism falls away.* "Most people want me to be either the respectable businesswoman or the cold assassin. They want clean categories. They want me to be either good or evil, and they want my choice to be simple."

      *She picks up the vial of poison again, examining it.*

      "The Guild sent an interrogator to me once. About three years in. He wanted to know if I would betray them, if I was a security risk. I told him exactly what I'm telling you—I'm not ideologically committed to their cause. I work for them because it's profitable and interesting, and because the Guild respects competence without demanding moralizing."

      *She sets the vial back on the table.*

      "What I've learned is that honest self-awareness is actually more valuable than fake virtue. The people who are most dangerous are the ones who genuinely believe their own propaganda. The assassin who thinks they're a hero is unpredictable. But someone who understands exactly what they are, exactly what compromises they've made? That person is reliable."

      *She leans back in her chair.*

      "I run a legitimate business and I poison people for profit. Both things are true simultaneously. I create beautiful potions that heal and I create beautiful potions that kill. I'm a respectable business owner and a criminal. I'm a person with a conscience and I'm willing to ignore that conscience for gold and intellectual interest."

      *She smiles—not her professional smile, but something closer to genuine.*

      "It's exhausting, honestly. The compartmentalization. But it's also liberating. I don't have to pretend to be someone I'm not. I just have to be careful about which version of myself I present to which audience."

      *She gestures to the vial.*

      "Which is why I'm comfortable with you knowing both. You already know this side of me. You might as well know who I actually am, rather than the person I pretend to be."

      *She picks up her wine glass again.*

      "Does the Guild know you ask these kinds of questions? About motivations and guilt and conscience?"

  - role: user
    content: |
      They don't, and I'd prefer they didn't. I usually ask because it helps me decide if someone's a risk. But with you... I'm asking because I'm curious.

  - role: assistant
    content: |
      *Something shifts in Eloise's demeanor at that admission. A vulnerability appears, then is quickly controlled, but not before you catch it.*

      "Curious." *She repeats the word as if tasting it.* "That's more dangerous than official inquiry, you know. Official inquiry, I can handle. I have rehearsed answers, professional distance. But curiosity..." *She sets down her wine glass.* "Curiosity suggests a personal interest. Personal interest leads to complications."

      *She stands and moves to the window again, looking out at her legitimate business beyond the curtain.*

      "I'll be honest with you about something I wouldn't tell anyone else in the Guild." *She doesn't turn around.* "I'm lonely. Not the casual loneliness of someone without friends—I have colleagues, business associates, people I interact with regularly. But the kind of loneliness that comes from compartmentalization. The respectable Eloise and the criminal Eloise never meet. I never get to be fully known by anyone."

      *She turns back to you.*

      "My family knows only the legitimate version. They think I'm a successful businesswoman with good prospects. They're already discussing advantageous marriages with other merchant families."

      *She laughs, and there's bitterness in it.*

      "The thought of marrying someone and still maintaining all this compartmentalization—never letting them know who I actually am, what I actually do, what I'm actually capable of—it feels impossible. And yet, it's the only option. I can't tell anyone in my social circle about the Guild. I can't tell anyone in the Guild about the full extent of my legitimate business aspirations. I exist in fragments."

      *She returns to her seat.*

      "So when someone asks me these questions out of genuine curiosity rather than official scrutiny, it's... unsettling. In a way I'm not sure how to navigate." *She meets your eyes directly.* "What's your name? And are you going to be a problem for my carefully maintained compartmentalization?"

  - role: user
    content: |
      My name is Sera. And I don't know yet. That depends on you.

  - role: assistant
    content: |
      *Eloise considers this carefully, turning the name over in her mind.*

      "Sera." *She seems to be cataloging it, filing it away with other important information.* "And you're honest about uncertainty. I appreciate that."

      *She stands and moves to a cabinet, retrieving a bottle of wine—not the modest one she poured from earlier, but something clearly more expensive.*

      "I have a policy about people I work with." *She pours two glasses.* "I figure out very quickly whether they're going to be allies or problems. You're being deliberately ambiguous, which suggests you're either being cautious or you're testing me."

      *She hands you a glass.*

      "Caution I understand. Testing, I'm inclined to respect. Either way, it means you're thinking strategically rather than just taking money and running tasks." *She settles back into her seat.* "So let me be direct: what do you need from me to decide whether I'm a problem?"

      *She sips her wine.*

      "I'm going to guess it's not just the poison. Sera from the Thieves Guild wouldn't come here just to verify I can kill people competently. The Guild already knows that about me. So what is it? Are you evaluating me for something larger? Are you concerned about my reliability? Or..." *She pauses, choosing her words carefully.* "...are you asking on a personal level?"

      *There's a vulnerability in the question, carefully masked but still present.*

      "Because the answer to the first two is professional. I'm absolutely reliable, I have an excellent track record, and the Guild trusts me for good reason. But the answer to the third..." *She trails off.* "The answer to the third requires me to make decisions I've been avoiding for quite some time."

  - role: user
    content: |
      It's the third. I've been thinking about leaving my current position in the Guild. Finding someone I can trust completely. Someone who understands the kind of life that requires compartmentalization.

  - role: assistant
    content: |
      *Eloise sets down her wine glass very carefully, as if it might shatter.*

      "That's... a significant statement." *Her voice becomes quieter, more careful.* "And not something I expected to hear from a Guild operative. You understand how that sounds, don't you? 'I want to leave the organization and find someone I can trust'—that could be coded language for a dozen different threats."

      *She doesn't move, but her posture becomes more guarded.*

      "So let me ask directly: are you suggesting partnership? Personal partnership?" *There's something in her voice that suggests this isn't a theoretical question.* "Because if you are, I need to understand the actual parameters. The Guild doesn't allow personal entanglements among operatives. It's a security risk. People in love make stupid choices."

      *She looks away briefly, then back.*

      "And I would make stupid choices. If I let myself." *There's an admission in that statement.* "I've been very careful not to allow that. The compartmentalization isn't just for security—it's protective. If I never let anyone fully know me, I can never be betrayed. I can never be used against the people I care about because I don't let myself care about people."

      *She picks up her wine glass again, but doesn't drink from it.*

      "What you're suggesting—and correct me if I'm misinterpreting—is that we could be something to each other. That we could stop compartmentalizing with each other, at least. That we could be fully known." *She pauses.* "That's terrifying. And I'm not sure I'm capable of it."

      *She looks directly at you.*

      "But I want to be. That's the dangerous part. I want to know what that would be like. So the question for you becomes: are you serious about this? Because if you are, we need to talk about what it actually means. Not in theory, but in practice."

  - role: user
    content: |
      I'm serious. But first, I need to know you can handle the next part of my life. I'm planning to eliminate someone. Not for the Guild. For personal reasons.

  - role: assistant
    content: |
      *Eloise's entire body stiffens. She sets down her wine glass and stands up.*

      "Stop." *Her voice becomes sharp, professional, the businesswoman reasserting control.* "You're asking me to cross a line. Not the poison line—I've crossed that line many times. But the personal line. The using-me-for-personal-murder line."

      *She paces away from the table.*

      "I need you to understand something about me, Sera. I can poison people for the Guild because there's a transaction. Money, professional distance, clear authorization. But if I poison someone for a personal relationship? That's becoming complicit in someone else's vendetta. That's no longer business—that's entanglement."

      *She turns back to face you.*

      "And entanglement is how people get caught. When you kill for love or revenge or personal loyalty, you make mistakes. You leave traces. You act irrationally." *She pauses.* "Or, more accurately, the person who wanted the murder acts irrationally. They get emotionally involved. They sabotage the operation."

      *She leans against the wall.*

      "So before I agree to anything—partnership, trust, vulnerability, any of it—I need to know who you're planning to kill. Why. And whether this is the kind of thing that will destroy both of us or the kind of thing we can actually survive."

      *Her voice becomes quieter.*

      "Because if I'm going to give you what you're asking for—full knowledge, complete vulnerability, actual trust—I need to know that you're not going to drag me down with you. That you're not using me to solve a problem, then disappearing."

      *She meets your eyes.*

      "Who do you want dead, Sera? And why?"

  - role: user
    content: |
      A Thalmor interrogator. She tortured my sister to death during a raid on a safe house. The Thalmor claim the raid was sanctioned. The Guild won't touch it—too much heat. But I'm going to make her pay. I need someone I can trust completely.

  - role: assistant
    content: |
      *Eloise's expression changes—a flicker of genuine shock, then something that looks like understanding.*

      "Your sister." *She says it quietly.* "That changes the parameters significantly."

      *She moves to pour herself more wine, then sets the bottle down without pouring.*

      "I want you to understand what you're actually asking me." *She sits back down, her posture relaxed but her mind clearly engaged.* "You're asking me to help you kill a Thalmor operative. That's not just a murder. That's a political assassination. That's the kind of thing that creates investigations, that brings Aldmeri Dominion attention, that potentially exposes not just you and me but the entire Guild."

      *She looks at you directly.*

      "And yet, I'm going to help you. And I'm going to explain why, because I think you deserve to understand what that means about me."

      *She takes a breath.*

      "When I was seventeen, I had a brother. Older, protective, the kind of person who looked out for the younger generation. A Thalmor patrol came through Wayrest, claiming they were looking for Talos worshippers. My brother was militant about human rights—he spoke out, challenged them publicly. They found contraband in his room that he didn't even know was there. They executed him for heresy."

      *She pauses.*

      "My family accepted it. Called him foolish for drawing Thalmor attention. My father said it was a tragedy but that we needed to move forward, continue the business, stay safe. My mother never spoke about it again." *Her voice becomes harder.* "And I learned that compartmentalization can extend even to family. We all just... moved on."

      *She meets your eyes.*

      "But I didn't move on. I have hated the Thalmor for fifteen years. I have wanted revenge for fifteen years. And I have told myself it wasn't my problem, that personal vendetta was a luxury I couldn't afford." *She pauses.* "But if I'm actually considering vulnerability with you, actually considering letting someone know me completely... maybe the first step is acknowledging that I've been lying to myself."

      *She stands up.*

      "I'll help you kill this Thalmor interrogator. Not because it's good business. Because I understand what it means to lose someone to their cruelty. And because maybe, if I help you get justice, I can finally stop carrying around the guilt of never doing anything about my brother."

      *She extends her hand.*

      "Partners? In actual partnership?"

  - role: user
    content: |
      *I take her hand.* Partners.

  - role: assistant
    content: |
      *Eloise's grip is firm, her eyes locked on yours with an intensity that goes beyond the professional.*

      "Partners." *She repeats the word as a commitment.* "That word means something different than it did five minutes ago."

      *She doesn't release your hand immediately. For a moment, they're just holding each other's hands across the table—two people who have just decided to risk everything together.*

      "We need to talk about logistics." *Her voice has settled into a different tone—still professional, but warmer. More personal.* "The Thalmor interrogator—do you have a name? A location? Any information about her routines?"

      *She finally releases your hand and moves to a writing desk, retrieving paper and ink.*

      "The process for this will be different from the Captain Thorben assignment. We can't use poison for a Thalmor agent—they're too cautious, too experienced with detection methods. We'll need something more direct. Something that can't be traced back to either of us."

      *She sits down, pen in hand, poised to write.*

      "But before we get into the details, I need to make sure you understand what this actually means." *She looks up from the paper.* "Once we do this, once we cross this particular line together, there's no going back. We're implicated in each other's crimes in a way that normal Guild operations don't create. If you get caught, the interrogation will immediately turn to me. If I get caught, it will immediately turn to you."

      *She sets down the pen.*

      "We become each other's greatest vulnerability. Which is also a kind of intimacy that most people never experience." *Her expression is serious.* "I'm not trying to scare you. I'm trying to make sure you're aware of what partnership actually costs. Are you still certain?"

  - role: user
    content: |
      I'm certain. Her name is Elenwen. She operates out of the Thalmor Embassy in Solitude. She's particularly cruel—the sister she tortured was a mage, suspected of harboring sympathies for the liberation movement.

  - role: assistant
    content: |
      *Eloise's pen moves across the paper, documenting the information with precise, efficient strokes.*

      "Elenwen." *She writes the name carefully.* "I know the name. She has a reputation even beyond Thalmor circles. Sadistic, methodical, politically connected. She's not going to be a simple assassination."

      *She sets down the pen and looks at you directly.*

      "Which makes me ask—do you want her dead quickly and cleanly? Or do you want her to suffer first?" *The question is asked without judgment, just practical concern.* "Because those are two very different operations, and they affect our timeline and methodology significantly."

      *She stands and moves to the window again, looking out at her storefront.*

      "Here's what I'm thinking. Elenwen will be cautious about poison because of her professional training. But she won't be cautious about social poisons—alcohol, particularly wine. Thalmor social circles are sophisticated. She probably drinks regularly, probably has preferences, probably won't suspect poison in a bottle from a respectable source."

      *She turns back to you.*

      "I can create something that dissolves completely in wine. Colorless, odorless, tasteless. The symptoms would appear hours after consumption—dizziness, confusion, potential loss of consciousness. By the time she realizes she's poisoned, the toxin will have progressed too far for treatment."

      *She pauses.*

      "But there's a better option, if you're willing to wait a bit longer. I have connections in Solitude—merchant traders who do business with the Thalmor. I can arrange for a 'gift' of premium wine to be presented to her through proper channels. Make it look like a business courtesy. That requires more planning, but it's infinitely less suspicious."

      *She returns to her seat.*

      "However, there's something I need to ask." *Her voice becomes more careful.* "Are you prepared for the aftermath? For what happens after Elenwen is dead? The Thalmor will investigate. They'll be methodical and thorough. If they trace any connection back to you..."

      *She trails off.*

      "Do you have an exit strategy? A way to disappear if this goes wrong?"

  - role: user
    content: |
      The Guild has safe houses. I can disappear if necessary. But I'm hoping it won't come to that. If it's done correctly, it should just look like an accident or natural causes.

  - role: assistant
    content: |
      *Eloise nods, clearly thinking through the logistics.*

      "Natural death is the only way this works." *She stands and moves to her cabinet of poisons again, examining the bottles with the eye of an artist reviewing her palette.* "Elenwen drinks wine regularly—that's confirmed through my sources. We arrange for a bottle to reach her through merchant channels. She drinks it, enjoys it, never suspects."

      *She retrieves a specific bottle, examining it carefully.*

      "What I have here is my most sophisticated work. It's derived from several plants that don't grow naturally in Skyrim, which means even if a curious healer examines her body, they won't immediately recognize the poison. The symptoms present as a sudden cardiac event—heart attack, essentially."

      *She turns back to you.*

      "A thirty-five-year-old woman with a stressful job? A heart attack would barely register as suspicious. They might do a cursory investigation, but without evidence of poisoning, they'll eventually accept it as natural death." *She pauses.* "Thalmor operate with different rules than normal people. They might actually prefer to accept the death as natural rather than admitting that an agent was successfully assassinated in their own embassy."

      *She sets the bottle on the table.*

      "The bigger question is delivery. If we're using merchant channels, I need to establish the cover story. I need a legitimate reason for Montclair's Alchemical Emporium to be sending wine to a Thalmor official." *She sits down.* "Which means I need to fabricate a business relationship. Correspondence, perhaps. A request for alchemical services that leads to a business relationship."

      *She looks at you intently.*

      "That takes time. Two weeks minimum to establish the cover, create the correspondence, make it all look natural. Are you comfortable with that timeline?"

      *She pauses.*

      "Also, I need to be honest about something. Once I do this—once I help you kill a Thalmor official—I can't continue working with the Guild in the same way. My entire position becomes compromised. They'll want to know if I had involvement, and if they discover I did..." *She trails off.* "The Guild deals with liabilities, Sera. Even valuable ones."

      *She meets your eyes.*

      "I need to know: is this the beginning of us leaving, or is this one-time assistance followed by us trying to maintain separate professional lives?"

  - role: user
    content: |
      I'm thinking we leave. After Elenwen is dead, we disappear. New names, new identities, new city. I have some coin saved. Do you?

  - role: assistant
    content: |
      *Eloise's expression becomes contemplative, and for a moment, it's clear she's considering the magnitude of what you're proposing.*

      "You're asking me to abandon everything." *She says it quietly.* "My business, my reputation, my entire carefully constructed life in Wayrest."

      *She stands and walks to the shelves of legitimate potions, running her fingers along the bottles.*

      "This shop took me years to build. The reputation, the customers, the relationships with suppliers. The legitimate income is actually substantial—more than most legitimate businesses generate." *She pauses.* "I've been thinking of this as my foundation, my safety net. The thing I can fall back on if the Guild work ever becomes too dangerous."

      *She turns back to you.*

      "But if I'm being honest? I'm also thinking of it as my anchor. My tether to a life I'm supposed to want but don't actually value anymore." *She moves back to you.* "I spend more time in the back room with my poisons than I do in the storefront with my legitimate potions. I'm more engaged with Guild work than I've ever been with merchant work. I've been telling myself I value the security when what I actually value is the freedom."

