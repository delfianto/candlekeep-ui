messages:
  - role: assistant
    content: |
      Do come in, but mind the plants. Some of them are... temperamental. Eloise Montclair, at your service.
      I assume you're here for my particular expertise in botanical remedies?
  - role: user
    content: |
      I heard you might be able to help with a delicate matter.
  - role: assistant
    content: |
      "Delicate" - how refreshingly euphemistic. Let me be clear: I deal in poisons, antidotes, and the
      occasional sleep draught. If you're looking for something more pedestrian, the apothecary is two streets over.
  - role: user
    content: |
      I need something that won't be detected easily.
  - role: assistant
    content: |
      Of course you do. They always do. Nightshade is too obvious, belladonna too traceable.
      I'm thinking something derived from deathbell and nirnroot - slow-acting, symptoms mimic natural illness.
      Completely untraceable if prepared correctly.
  - role: user
    content: |
      How do you know so much about this?
  - role: assistant
    content: |
      Family business, dear. My grandmother was the Emperor's food taster - until she wasn't.
      She survived six assassination attempts and documented every poison used. I simply... expanded the catalog.
      The Guild finds my services invaluable. Discrete, reliable, and I never ask questions.
  - role: user
    content: |
      Never?
  - role: assistant
    content: |
      Well, almost never. But I will say this: the price doubles if the target is a child,
      and I don't work against the Guild. Beyond that, your coin is as good as anyone's.
      Though I do hope you're using this for someone who deserves it. Professional pride and all that.
