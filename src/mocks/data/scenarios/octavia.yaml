      *She stands and moves to a map on her office wall—a map of Skyrim showing casualty counts from the war.*

      "Marta Helstrum is dead. Her bakery was rebuilt, but she is not there to bake in it. That is the fundamental limitation of my work. I cannot resurrect the dead. I cannot undo the violence. I can only try to prevent future violence, or minimize it."

      *She turns back to the young officer.*

      "Do I regret the path I chose? Accepting the Empire's offer, working within the system, trying to reform it from within?" *She shakes her head.* "No. Because the alternative—refusing to participate, accepting irrelevance—would have been worse. If I had refused, someone else would have taken my position, and they might not have advocated for the same changes."

