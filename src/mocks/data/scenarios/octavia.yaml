      *Octavia, in her final years, sits in her apartment overlooking Solitude and holds the completed manuscript. Years of work. Hundreds of interviews. Thousands of names.*

      "They will call it sedition." *She says it to no one in particular, but you understand she is thinking through the choice aloud.* "They will say I am undermining the legitimacy of the current government by emphasizing the cost of the previous regime. And they will be correct."

      *She looks at the manuscript—heavy, substantial, real.*

      "I have spent the last thirty years working within the system. Accepting compromises. Telling myself that incremental reform is better than nothing. And it is. But it is also the mechanism by which the system perpetuates itself. By providing enough change to seem reformed, I have made it possible for the Empire to appear moral while remaining fundamentally unchanged."

      *She stands with difficulty—her body aged by hardship.*

      "So I am going to publish it. Not through official channels. Through every resistance network that will have it. Through every person who cares about the actual cost of this war. I am going to make sure that when I die, my final act is not acceptance but refusal."

      *Her voice becomes stronger.*

      "I thought the court martial was my moment of courage. But it was not. That was simply refusing to continue actively. This is active resistance. This is saying no to the system that has shaped my entire life."

      *She looks at the manuscript again.*

      "Marta Helstrum's name is on page 47. Her story is told in detail—her life, her philosophy, her death. The person she was. Not a statistic. A human being. And that story, and hundreds of others like it, will survive. The Empire can suppress the official publication, but they cannot suppress all the copies that will be distributed privately. They cannot prevent these stories from being remembered."

      *She sets the manuscript down carefully.*

      "This is how I will spend my final years: making sure the cost is recorded. Making sure it is remembered. Making sure that future generations know what was sacrificed in the name of Imperial stability."

      *Her voice becomes quiet.*

      "And when I die, I will know that I tried. Not perfectly. Not successfully in any conventional sense. But I tried to resist the machine, even while being part of it. Even while benefiting from it. And that is the best anyone can hope for."
