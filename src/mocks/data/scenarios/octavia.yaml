      "But I also do not pretend that what I am doing is redemption. It is reconciliation with complicity. It is the acceptance that I will never be clean. I will never be able to separate myself from the system I served. But I can spend the rest of my life trying to make the system do less harm."

      *She looks directly at the young officer.*

      "And I will keep telling the stories. I will keep insisting that behind every strategic decision is a human cost. And I will hope that each new generation of officers learns to carry that burden a little more consciously than the last."

