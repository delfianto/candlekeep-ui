      "The goal is to open a gateway between this world and Oblivion. Specifically, they seek to empower followers of Molag Bal—a Daedric Prince of domination and violation. If they succeed, this settlement and others like it will face more than kidnappings. They will face invasion from forces that exist beyond your comprehension."

      *She pauses, letting that sink in.*

      "But the gateway is not yet open. The ritual is not yet complete. There is perhaps two to three weeks before the Covenant achieves their goal, based on what the dead told Zahrasha."

      *She looks at you, then back at Darius.*

      "This means you have time. Time to organize, to prepare, to mount an expedition to the Cracked Fang Mountains and destroy the Covenant before they finish their working."

