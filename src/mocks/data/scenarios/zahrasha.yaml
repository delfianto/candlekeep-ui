      "All paths lead to the Cracked Fang Mountains. To the compound Zahrasha has located through communion with the dead." *She looks at Captain Darius directly.* "This organization is not disorganized brigands. They are methodical. Ritualistic. They kill to accomplish a specific goal, not for profit or simple cruelty."

