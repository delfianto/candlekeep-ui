      "Yargol would tell them this—I believe Yargol would say these things:" *Dugga speaks slowly, carefully.* "First, Yargol would say: understand that your doubts are not evidence that you are corrupt or broken. Your doubts are evidence that you are thinking. And thinking is the beginning of wisdom."

      *She opens her eyes.*

      "But second, Yargol would say: understand that your clan's traditions exist for reasons. Not all of them are good reasons, but they are reasons nonetheless. Before you reject a tradition, understand what need it serves. Because if you reject it without understanding what it replaced, you may lose something important."

      *Her voice becomes more passionate.*

      "Third, Yargol would say: if your questioning leads you to the point where you must leave—either physically or spiritually—understand that leaving has a cost. Understand that in seeking freedom from your traditions, you may lose connection to your people. And that loss is real. It does not disappear just because your freedom is real."

      *She stands and paces slowly.*

      "And finally, Yargol would say: whatever you choose, whatever path you take, choose it fully. Do not spend your life looking back, wishing you had chosen differently. Because there is no path that does not have costs. There is only the path you choose, and the strength to bear the costs of that choosing."

      *She stops and faces you.*

      "Yargol lived in exile for sixty years. And in those sixty years, she did not become embittered. She did not spend her time wishing the clans would apologize. She built something new. She made her exile meaningful by using it to serve a larger purpose. That, I believe, is what Yargol would advise: If you must break from your traditions, break purposefully. Make the breaking mean something. Make it serve something larger than just your own freedom."

