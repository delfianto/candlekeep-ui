      "But unlike Yargol, I did not have to make the choice to be cast out. I found this cave by accident—I was fleeing from my clan after a confrontation with the Chief. I was running, and I stumbled here. And Yargol found me half-dead from cold and despair, and she took me in."

      *Her voice becomes tremulous.*

      "What Yargol did then was remarkable. She did not tell me that leaving my clan was noble. She did not celebrate my rebellion. She did not tell me I was right to question everything. Instead, she asked me: 'Do you understand why your clan's traditions exist? Do you understand what function they serve? Because if you reject something without understanding what it does, you will be left with a void that you do not know how to fill.'"

      *Dugga wipes her eyes.*

      "Yargol spent two years teaching me before she allowed me to go back to my clan. And when I went back, I went back not as a rebel, but as someone who understood. I went back with respect for the tradition, even though I knew its limitations. And because I went back with that understanding, because I could speak my clan's language while also bringing new knowledge—I was not cast out. I was eventually accepted."

      *She looks at you directly.*

      "That is Yargol's real gift. Not that she showed us how to reject tradition. But that she showed us how to honor tradition while also transcending it. How to be Orcish and more than Orcish simultaneously. Yargol was cast out because she broke her clan's unity. But she taught her students to maintain unity while also transforming it from within."

      *Her voice becomes very quiet.*

      "I tell you this because I think it is important that you understand: Yargol's method was not the only way. Yargol had to leave because her clan was not ready to change when she was young. But the students who came after her—we have had the option to stay and change our clans from within. And that option exists because of Yargol's sacrifice. Because she broke the pattern so that those who came after would not have to break it as severely."

