      "I was sixteen summers old." *Dugga begins.* "I had questions about everything. The warrior training felt brutal and meaningless. The hierarchy felt unjust. The refusal to learn from other peoples felt like fear masquerading as strength. I was marked as a troublemaker, and I knew that if I continued on the path I was on, I would be cast out just like the legendary Yargol had been."

