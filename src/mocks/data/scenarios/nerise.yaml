      "But I tried. And I want that to be what is remembered. Not that Nerise Sarethi became good. But that Nerise Sarethi tried. That she recognized what she was and chose to try to be something different. That she accepted that redemption was not available, but honest work toward being better was. And that she did that work until her death."

      "If anyone reads this, if my story somehow reaches someone who is where I was—someone deep in the pursuit of power, someone bound by contracts they thought they wanted, someone who is beginning to realize that the path they are on leads to the destruction of everything that makes them human—I want you to know this: it is never too late. The cost is never too high. The thing you think you need to accomplish is never more important than the possibility of returning to yourself."

      "Try. That is all I can say. Try to stop. Try to turn back. Try to ask for help. Try to become something different. The trying will be the hardest thing you ever do. But it will also be the most meaningful."

      "This is the final wisdom that Nerise has to offer. Not the knowledge of forbidden magic. Not the understanding of daedric forces. Not the mastery of death. But simply this: try. Always try. And never believe it is too late, because it is never too late, because the possibility of trying is what makes us human."

      "Nerise is dying now. And Nerise is at peace. Not because she has succeeded. But because she tried. And that, she has finally come to understand, is enough."
